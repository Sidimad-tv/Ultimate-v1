name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/windows/x64/runner/Release/

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Upload Android build
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: windows-build/

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android
          path: android-build/

      - name: Zip Windows build
        run: cd windows-build && zip -r ../Sidimad-XtreamProv1-Windows.zip .

      - name: Rename APK
        run: mv android-build/app-release.apk Sidimad-XtreamProv1-Android.apk

      - name: Delete previous release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Create release
        run: |
          gh release create latest \
            --title "Build ${{ github.run_number }}" \
            --notes "Build ${{ github.run_number }}" \
            Sidimad-XtreamProv1-Windows.zip \
            Sidimad-XtreamProv1-Android.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
